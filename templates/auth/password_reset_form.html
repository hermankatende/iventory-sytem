<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | Inventory Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">Forgot password</h1>
        <p class="text-muted">Enter your account email and we will send reset instructions.</p>

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_email">Email</label>
            {{ form.email }}
          </div>
          {% if form.errors %}
            <div class="alert alert-danger">{{ form.errors }}</div>
          {% endif %}
          <button class="btn btn-primary" type="submit">Send reset link</button>
          <a class="btn btn-outline-secondary" href="{% url 'login' %}">Back to login</a>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
