<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set New Password | Inventory Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 560px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Set a new password</h1>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_new_password1">New password</label>
            {{ form.new_password1 }}
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_new_password2">Confirm password</label>
            {{ form.new_password2 }}
          </div>
          {% if form.errors %}
            <div class="alert alert-danger">{{ form.errors }}</div>
          {% endif %}
          <button class="btn btn-primary" type="submit">Reset password</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
