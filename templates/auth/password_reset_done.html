<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Email Sent | Inventory Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 560px;">
    <div class="alert alert-info shadow-sm">
      <h1 class="h5">Check your email</h1>
      <p class="mb-0">If an account exists for that email address, a password reset link has been sent.</p>
    </div>
    <a class="btn btn-outline-primary" href="{% url 'login' %}">Return to login</a>
  </main>
</body>
</html>
