<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security Activity | Inventory Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Security activity</h1>
      <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Back</a>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-sm align-middle">
        <thead>
          <tr>
            <th>Time</th>
            <th>User</th>
            <th>Method</th>
            <th>Path</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for entry in entries %}
            <tr>
              <td>{{ entry.created_at }}</td>
              <td>{{ entry.user.username|default:'anonymous' }}</td>
              <td>{{ entry.method }}</td>
              <td>{{ entry.path }}</td>
              <td>{{ entry.action }}</td>
            </tr>
          {% empty %}
            <tr><td colspan="5" class="text-center text-muted">No activity found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
