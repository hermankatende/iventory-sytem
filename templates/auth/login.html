<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | Inventory Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 460px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Sign in</h1>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Password</label>
            {{ form.password }}
          </div>

          {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}

          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>

        <div class="mt-3 text-center d-flex flex-column gap-2">
          <a href="{% url 'signup' %}">Create an account and choose a role</a>
          <a href="{% url 'password_reset' %}">Forgot password?</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
